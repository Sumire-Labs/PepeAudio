name: Bug report
description: Report a problem with PepeAudio
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Do NOT include tokens, secrets, or connection strings.
        For security vulnerabilities, use the private advisory flow in SECURITY.md instead.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, what did you expect, what happened instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. /play ...
        2. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
    validations:
      required: true
  - type: dropdown
    id: runtime
    attributes:
      label: How are you running it?
      options:
        - Docker Compose
        - dotnet run (host)
        - Other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste logs with secrets redacted.
      render: shell
