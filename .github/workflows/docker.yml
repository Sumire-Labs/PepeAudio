name: Docker image

# Validates that the production image actually builds. It does NOT push anywhere
# (no registry credentials required); it's a build-only smoke test of the deploy
# path.
#
# NOTE: the image installs ffmpeg from Debian's package repo (no from-source
# build), so it builds quickly; Buildx's GitHub Actions cache keeps subsequent
# runs fast. Runs on-demand and on release tags by default (see the `on:` block
# to also enable per-merge validation).
on:
  # On-demand, and automatically on release tags (a natural point to confirm the
  # deploy image is buildable). To also validate on every merge to main, uncomment
  # the push/branches block below — but note the first-run ffmpeg compile cost.
  workflow_dispatch:
  push:
    tags: ['v*']
  # push:
  #   branches: [main]
  #   paths: ['Dockerfile', '.dockerignore', 'src/**', 'assets/**', 'package.json', 'pnpm-lock.yaml', '.github/workflows/docker.yml']

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-image:
    name: Build image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The image does `COPY dist ./dist`, and dist/ is gitignored, so it has to
      # be built on the runner before docker build.
      - name: Build dist
        run: pnpm build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: pepeaudio:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
