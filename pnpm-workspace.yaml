allowBuilds:
  '@discordjs/opus': true
  better-sqlite3: true
  esbuild: true
  ffmpeg-static: true
  ytdlp-nodejs: true

# Pull transitive dependencies with known-vulnerable pinned versions up to a
# patched release. Both are compatible drop-ins:
#   - axios: @vncsprd/soundcloud-downloader pins axios ^0.21.0 (0.21.4 has 11
#     high-severity CVEs — SSRF, redirect credential leak, ReDoS, prototype
#     pollution). The downloader only ever calls axiosInstance.get(url, {headers,
#     responseType:'stream'}), an API that is unchanged across 0.21 → 1.x.
#   - undici: discord.js pins 6.24.1; 6.27.0 patches a WebSocket DoS and two
#     Set-Cookie issues, staying within the 6.x line @discordjs/rest expects.
# (tar 6.2.1 is deliberately NOT overridden: its advisories are all
# malicious-archive extraction, it is used only at install time to unpack the
# trusted @discordjs/opus prebuild, no patched 6.x exists, and forcing 7.x
# would break node-pre-gyp's `^6.1.11` requirement and the native opus build.)
overrides:
  '@vncsprd/soundcloud-downloader>axios': '^1.18.1'
  undici: '^6.27.0'

# Supply-chain delay: refuse to install any package version published less than
# this many minutes ago (7 days), so a freshly-published compromised release of
# a dependency can't be pulled in before it's flagged/yanked. The Exclude list
# below opts specific already-vetted pins out of the delay.
minimumReleaseAge: 10080
minimumReleaseAgeExclude:
  - discord.js@14.26.5
  # Dev-only toolchain (never in the production image) moves fast; excluding it
  # keeps `--frozen-lockfile` CI green without weakening the delay on the
  # runtime dependency tree, which is the part that actually processes
  # untrusted input.
  - '@typescript-eslint/*'
  - typescript-eslint
  - '@types/node'
  - brace-expansion
  - ignore
