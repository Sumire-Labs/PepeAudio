# Production-oriented Compose file. Ties together the hardening pieces:
#   - non-root container (see Dockerfile `USER node`)
#   - persistent SQLite volume (guild settings survive `docker compose up -d` redeploys)
#   - the bot TOKEN supplied as a FILE-mounted secret, never an env var
#     (env vars leak via `docker inspect` / /proc/<pid>/environ / child processes)
#   - restart policy — required, because an uncaughtException now exits the
#     process on purpose so a supervisor can restart it clean.
#
# Setup:
#   1) mkdir -p secrets && printf '%s' 'YOUR_BOT_TOKEN' > secrets/discord_token.txt
#      chmod 600 secrets/discord_token.txt        # (secrets/ is gitignored)
#   2) put CLIENT_ID (public application id) in a .env next to this file, or export it
#   3) docker compose up -d --build
services:
  pepeaudio:
    build: .
    restart: unless-stopped
    # ShardingManager's own graceful shutdown budget is 8s (see shard.ts) on
    # top of each shard's 5s watchdog (index.ts) - 30s leaves comfortable
    # headroom before Docker would otherwise SIGKILL on its own.
    stop_grace_period: 30s
    environment:
      CLIENT_ID: "${CLIENT_ID:?set CLIENT_ID (public application id) in a .env or your shell}"
      GUILD_ID: "${GUILD_ID:-}"
      NODE_ENV: production
      DATA_DIR: /data
      # Read the token from the mounted secret file rather than an env var.
      DISCORD_TOKEN_FILE: /run/secrets/discord_token
      # ---- Web dashboard (optional) ----
      # To enable: set these, add the ports + extra secrets below, create the
      # two secret files, and register OAUTH_REDIRECT_URI in the Developer Portal.
      # WEB_DASHBOARD_ENABLED: "true"
      # WEB_PORT: "8080"
      # WEB_BIND_HOST: "0.0.0.0"                       # reachable via the published port below
      # WEB_PUBLIC_URL: "${WEB_PUBLIC_URL:-}"          # e.g. https://panel.example.com
      # DISCORD_CLIENT_SECRET_FILE: /run/secrets/discord_client_secret
      # SESSION_SECRET_FILE: /run/secrets/session_secret
    secrets:
      - discord_token
      # - discord_client_secret
      # - session_secret
    # ports:
    #   - "8080:8080"        # only when the dashboard is enabled; front it with a TLS reverse proxy
    volumes:
      - pepeaudio-data:/data

secrets:
  discord_token:
    # Contains ONLY the token, no KEY= prefix and no trailing newline needed.
    file: ./secrets/discord_token.txt
  # discord_client_secret:
  #   file: ./secrets/discord_client_secret.txt   # OAuth2 client secret
  # session_secret:
  #   file: ./secrets/session_secret.txt          # 32+ random chars (crypto.randomBytes)

volumes:
  pepeaudio-data:
